    <!-- Structured data: FAQPage (50 preguntas frecuentes) -->
    <!-- Refleja exactamente las FAQ que se muestran en la landing (data/faq.ts).
         Si modificas el listado, actualiza tambien data/faq.ts para mantener
         consistencia entre lo que ve el usuario y lo que ve el bot. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "¿Qué es Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Una herramienta web para visualizar datos territoriales sobre el mapa de Venezuela. Permite subir un CSV o Excel y verlo pintado sobre estados o municipios en segundos. También trae indicadores oficiales pre-cargados como población, IDH y tasa de homicidios."
            }
          },
          {
            "@type": "Question",
            "name": "¿Para qué sirve Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Para que periodistas, investigadores, ONGs y ciudadanos puedan crear mapas coropléticos de Venezuela sin saber GIS, sin instalar nada y sin pagar. Sirve tanto para ilustrar notas y reportes como para explorar visualmente los indicadores oficiales del país."
            }
          },
          {
            "@type": "Question",
            "name": "¿Quién hizo Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Mapitas es un proyecto open source mantenido bajo el handle bronco-drift. El código fuente está disponible públicamente en GitHub. No es una empresa ni una organización con fines de lucro."
            }
          },
          {
            "@type": "Question",
            "name": "¿Es gratis Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí, completamente. Sin paywall, sin freemium, sin marca de agua en los mapas exportados. El proyecto es open source y se aloja en un CDN estático, por lo que el costo de operación es cercano a cero."
            }
          },
          {
            "@type": "Question",
            "name": "¿Tengo que crear una cuenta?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Mapitas no tiene login, registro ni perfiles. Abrís la página y empezás a usar. Tus preferencias (paleta, indicador activo, capas) se guardan en tu navegador con localStorage, no en un servidor."
            }
          },
          {
            "@type": "Question",
            "name": "¿Por qué se enfoca en Venezuela?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Porque resolver bien un país obliga a construir las abstracciones correctas para escalar al siguiente. Venezuela es el primer caso completo; el código ya está preparado para sumar otros países latinoamericanos en el futuro sin reescribirse."
            }
          },
          {
            "@type": "Question",
            "name": "¿Mapitas es open source?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. El código fuente completo está en GitHub bajo el repositorio bronco-drift/mapitas. Cualquiera puede revisar cómo funciona, proponer mejoras, abrir issues o usarlo como base para sus propios proyectos."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cuánto cuesta usar Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Nada. No tiene planes, no hay pago por uso ni límite de mapas generados. Tampoco existe una versión pro pagada. El modelo es 100% gratuito y libre, en línea con el principio de transparencia que motiva al proyecto."
            }
          },
          {
            "@type": "Question",
            "name": "¿En qué se diferencia Mapitas de Datawrapper o Flourish?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Mapitas se especializa exclusivamente en Venezuela, con datos oficiales pre-cargados y geometrías ya validadas para estados y municipios. No tiene marca de agua, no requiere login y todo el procesamiento ocurre en tu navegador. Datawrapper y Flourish son más generales pero menos integrados con datos venezolanos."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cuál es la misión de Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Hacer la transparencia territorial accesible para cualquier persona. Que los datos relevantes para la ciudadanía dejen de estar encerrados en PDFs y silos institucionales y pasen a ser visibles, comparables y públicos sobre un mapa que todos entienden."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cómo subo mis datos a Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "En el panel lateral hay un botón Subir CSV o Excel. Podés arrastrar tu archivo o seleccionarlo desde el sistema. Mapitas detecta las columnas automáticamente y te pide confirmar cuál es el nombre del estado o municipio y cuál es el valor a mapear."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué formatos de archivo acepta Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "CSV (separado por coma), TSV (separado por tabulación), Excel (.xlsx y .xls) y OpenDocument Spreadsheet (.ods). El parseo se hace localmente con PapaParse y SheetJS, sin subir tu archivo a ningún servidor."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cómo debe estar estructurado mi CSV?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Solo necesitás una columna con el nombre del estado o municipio y una columna con el valor numérico. Mapitas adivina cuál es cuál y te deja confirmar. Si trabajás a nivel municipio y hay nombres repetidos entre estados, podés sumar una columna opcional de estado padre para desambiguar."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué pasa si los nombres de mis municipios tienen tildes o abreviaciones?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Mapitas usa fuzzy matching: tolera tildes faltantes, mayúsculas, espacios extra y abreviaciones comunes como Edo. o Mcpio. Después de cargar el archivo, te muestra cuántas filas matchearon y cuáles no, con la lista exacta de los nombres no reconocidos para que los corrijas."
            }
          },
          {
            "@type": "Question",
            "name": "¿Puedo elegir qué columna usar como valor?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. Después de subir el archivo, Mapitas muestra dropdowns con todas las columnas detectadas. Vos elegís cuál usar como geo (nombre) y cuál como valor. Si cambiás de idea, podés modificar el mapeo sin volver a subir el archivo."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cómo cambio la paleta de colores en Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "En la pestaña Estilo del panel hay doce paletas predefinidas más una opción custom con dos color pickers (color inicial y final). También podés mover el centro del gradiente con un editor de rango que muestra el histograma de tus datos."
            }
          },
          {
            "@type": "Question",
            "name": "¿Puedo personalizar el rango de colores?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí, con el range editor. Muestra el histograma de tus datos con tres handles (mínimo, medio, máximo) que podés mover. Por default se aplica un auto-clip de outliers usando los percentiles 2 y 98 para que un valor extremo no aplane el resto del mapa. Es toggleable."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cómo exporto el mapa que generé?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Por ahora la forma directa es hacer un screenshot del navegador (Ctrl+Shift+S en Firefox, Command+Shift+4 en Mac, o herramientas como Lightshot y ShareX). En el roadmap hay un export directo a PNG y SVG previsto para los próximos meses."
            }
          },
          {
            "@type": "Question",
            "name": "¿Puedo hacer un mapa con fondo transparente?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. En la pestaña Estilo, sección Vista, hay un toggle de Fondo transparente pensado justamente para esto. Sirve para que el mapa exportado se vea bien sobre cualquier color de fondo en notas, presentaciones, sitios web o redes sociales."
            }
          },
          {
            "@type": "Question",
            "name": "¿Mapitas funciona en celular?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí, Mapitas es responsive. En mobile el panel de controles aparece como una bottom sheet deslizable que no oscurece el mapa al abrirse, así seguís viendo lo que estás mapeando mientras ajustás. Hay un botón flotante Panel para invocarla desde cualquier vista."
            }
          },
          {
            "@type": "Question",
            "name": "¿De dónde vienen los datos de Venezuela?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Las geometrías de estados y municipios vienen de geoBoundaries (William & Mary). Las del Esequibo de Provita / IGVSB. Los indicadores oficiales del Instituto Nacional de Estadística (INE), del Observatorio Venezolano de Violencia (OVV) y de Source CV. Las capas temáticas son del geoportal de Provita."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué indicadores oficiales vienen pre-cargados?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Siete: población 2024, población 2026 (proyección), Índice de Desarrollo Humano (IDH), PIB total, PIB per cápita, área en kilómetros cuadrados y tasa de homicidios del OVV. Cada indicador muestra su fuente y año dentro de la app, en la leyenda del mapa."
            }
          },
          {
            "@type": "Question",
            "name": "¿Por qué hay municipios sin datos en algunos indicadores?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Porque las fuentes oficiales no publican datos para todas las entidades. En la lista de indicadores aparece un badge en color ámbar con el número de entidades sin datos. Si hacés click ahí, se abre un modal con la lista completa de qué está faltando, para que la opacidad de los datos sea visible."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué pasa con el Esequibo en Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Está incluido como entidad propia con su geometría, basada en datos de Provita / IGVSB. La mayoría de los indicadores oficiales no publica datos diferenciados para el Esequibo, así que aparece en gris en esos casos. En el roadmap se planea agregar valores espejados desde Delta Amacuro como estimaciones marcadas."
            }
          },
          {
            "@type": "Question",
            "name": "¿Por qué Dependencias Federales aparece en gris?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Porque las fuentes oficiales (INE, OVV, Wikipedia) no publican datos demográficos para esa entidad. Está representada con su geometría correcta, pero los indicadores quedan sin valor. En el roadmap hay un plan para agregar estimaciones marcadas explícitamente como aproximadas, no oficiales."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué año tienen los datos de población?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Hay dos series disponibles: población 2024 y proyección 2026, ambas basadas en publicaciones del INE. La proyección 2026 está marcada como estimación. En el futuro se sumarán las series históricas 2010, 2020 y 2050 que ya están procesadas, a la espera de una UI de timeline slider."
            }
          },
          {
            "@type": "Question",
            "name": "¿De dónde viene la tasa de homicidios?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Del Observatorio Venezolano de Violencia (OVV), una organización independiente que publica estadísticas anuales de violencia letal por estado y municipio. Es una fuente reconocida internacionalmente, citada por medios y trabajos académicos sobre seguridad pública en Venezuela."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué son las capas temáticas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Son once capas opcionales del geoportal de Provita / IGVSB que podés superponer al mapa: áreas protegidas, territorios indígenas, cuencas hidrográficas, vialidad, lotes petroleros, energía, centros poblados y otras. Se cargan bajo demanda para no aumentar el peso del bootstrap inicial."
            }
          },
          {
            "@type": "Question",
            "name": "¿Quién valida que los datos sean correctos?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Las fuentes son las oficiales (INE, OVV, Provita). Mapitas no genera datos propios, los normaliza y consolida. Cuando un dato es estimado o tiene baja confianza, la app lo indica explícitamente con la leyenda datos ilustrativos · validar contra fuente oficial para que el usuario sepa."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué licencia tienen los datos?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "geoBoundaries y Provita publican bajo Creative Commons BY 4.0. Wikipedia bajo CC BY-SA. Los datos del INE y OVV son de acceso público según las leyes venezolanas de estadística. Las licencias específicas se documentan en el repositorio de GitHub."
            }
          }
        ]
      }
    </script>
