    <!-- Structured data: FAQPage (Mapitas, herramienta generica) -->
    <!-- Refleja las FAQ que se muestran en la landing principal (data/faq-mapitas.ts).
         Para las FAQ del proyecto MIDE (datos Venezuela) ver data/faq-mide.ts;
         por ahora viven solo dentro del componente MIDE y no en este schema.
         Cuando se implemente pre-rendering por ruta, /mide tendra su propio
         FAQPage schema independiente. -->
    <!-- FAQ_BLOCK_START -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          
          {
            "@type": "Question",
            "name": "¿Qué es Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Una herramienta web para crear mapas coropléticos en el navegador. Subís un CSV o Excel y se pinta sobre el mapa de un país en segundos. Sin pagar, sin login, sin instalar nada."
            }
          },
          {
            "@type": "Question",
            "name": "¿Para qué sirve Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Para visualizar cualquier dataset territorial: indicadores demográficos, económicos, ambientales o tus propios datos. Útil para periodistas, investigadores, ONGs, estudiantes y curiosos que necesitan mostrar información sobre un mapa sin saber GIS."
            }
          },
          {
            "@type": "Question",
            "name": "¿Es gratis Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí, completamente. Sin paywall, sin freemium, sin marca de agua. Es un proyecto open source que se aloja en un CDN estático."
            }
          },
          {
            "@type": "Question",
            "name": "¿Tengo que crear una cuenta?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Mapitas no tiene login, registro ni perfiles. Abrís la página y empezás. Tus preferencias (paleta, configuración de estilo) se guardan en tu navegador con localStorage."
            }
          },
          {
            "@type": "Question",
            "name": "¿Mapitas es open source?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. El código fuente está en GitHub bajo bronco-drift/mapitas. Cualquiera puede revisar cómo funciona, proponer mejoras o usarlo como base para sus propios proyectos."
            }
          },
          {
            "@type": "Question",
            "name": "¿En qué se diferencia de Datawrapper, Flourish o MapChart?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Mapitas corre 100% en tu navegador (no toca servidor), no exige login ni marca de agua, es open source, y prioriza la velocidad: el mapa aparece en menos de 30 segundos desde que abrís el sitio."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cuál es la misión de Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Hacer la visualización territorial accesible para cualquier persona, sin barreras técnicas ni económicas. La herramienta es genérica; los datos curados de Venezuela viven en el proyecto MIDE, que usa Mapitas como base."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cómo subo mis datos a Mapitas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "En el panel lateral hay un botón Subir CSV o Excel. Arrastrás tu archivo o lo seleccionás. Mapitas detecta las columnas automáticamente y te pide confirmar cuál es el nombre del territorio y cuál es el valor a mapear."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué formatos de archivo acepta?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "CSV (separado por coma), TSV (separado por tabulación), Excel (.xlsx y .xls) y OpenDocument Spreadsheet (.ods). El parseo se hace localmente con PapaParse y SheetJS, sin subir tu archivo a ningún servidor."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cómo debe estar estructurado mi CSV?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Necesitás una columna con el nombre del territorio (estado, departamento, municipio, etc.) y una columna con el valor numérico. Mapitas adivina cuál es cuál y te deja confirmar el mapeo después."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué pasa si los nombres de mis territorios tienen tildes o abreviaciones?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Mapitas usa fuzzy matching: tolera tildes faltantes, mayúsculas, espacios extra y abreviaciones comunes. Después de cargar el archivo, te muestra cuántas filas matchearon y cuáles no, con la lista exacta para corregir."
            }
          },
          {
            "@type": "Question",
            "name": "¿Puedo elegir qué columna usar como valor?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. Después de subir el archivo, Mapitas muestra dropdowns con todas las columnas detectadas. Elegís cuál usar como geo (nombre) y cuál como valor. Podés cambiar el mapeo sin volver a subir el archivo."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cómo cambio la paleta de colores?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "En la pestaña Estilo del panel hay doce paletas predefinidas más una opción custom con dos color pickers (color inicial y final). También podés mover el centro del gradiente con un editor de rango que muestra el histograma de tus datos."
            }
          },
          {
            "@type": "Question",
            "name": "¿Puedo personalizar el rango de colores?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí, con el range editor. Muestra el histograma de tus datos con tres handles (mínimo, medio, máximo) que podés mover. Por default se aplica un auto-clip de outliers usando los percentiles 2 y 98 para que un valor extremo no aplane el resto del mapa."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cómo exporto el mapa que generé?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Por ahora la forma directa es hacer un screenshot del navegador. En el roadmap hay un export directo a PNG y SVG previsto para los próximos meses."
            }
          },
          {
            "@type": "Question",
            "name": "¿Puedo hacer un mapa con fondo transparente?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. En la pestaña Estilo hay un toggle de Fondo transparente. Sirve para que el mapa exportado se vea bien sobre cualquier color de fondo en notas, presentaciones o redes sociales."
            }
          },
          {
            "@type": "Question",
            "name": "¿Mapitas funciona en celular?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí, Mapitas es responsive. En mobile el panel de controles aparece como una bottom sheet deslizable que no oscurece el mapa al abrirse, así seguís viendo lo que estás mapeando mientras ajustás."
            }
          },
          {
            "@type": "Question",
            "name": "¿Mis datos se suben a un servidor?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Todo el procesamiento ocurre en tu navegador. Cuando subís un CSV, el archivo nunca sale de tu máquina: las librerías de parseo lo leen localmente y los resultados se renderizan en el mapa sin tocar ningún backend."
            }
          },
          {
            "@type": "Question",
            "name": "¿Mapitas tiene tracking o analytics?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Mapitas no usa Google Analytics, Facebook Pixel ni ningún script de seguimiento. No se sabe quién entra, qué hace ni cuántas veces vuelve."
            }
          },
          {
            "@type": "Question",
            "name": "¿Necesita conexión a internet para funcionar?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sólo la primera vez para descargar la app y los datos base. Una vez cargada, funciona offline: podés navegar el mapa, cambiar configuración y aplicar estilos sin conexión."
            }
          }
                ]
      }
    </script>
