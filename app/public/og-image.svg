<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(80, 80)">
    <rect width="80" height="80" rx="18" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <path d="M17 60 V20 H28 L40 40 L52 20 H63 V60 H52 V32 L43 50 H37 L28 32 V60 Z" transform="translate(0, 0)" fill="url(#logo)"/>
  </g>
  <text x="180" y="135" fill="#94a3b8" font-size="22" font-weight="500" letter-spacing="4">MAPITAS</text>
  <text x="80" y="280" fill="#f8fafc" font-size="76" font-weight="700" letter-spacing="-2">Mapas de Venezuela.</text>
  <text x="80" y="370" fill="#cbd5e1" font-size="76" font-weight="400" letter-spacing="-2">Datos al instante.</text>
  <text x="80" y="450" fill="#94a3b8" font-size="28" font-weight="400">Indicadores territoriales o tu propio CSV. 100% en tu navegador.</text>
  <g transform="translate(80, 510)">
    <rect width="160" height="40" rx="20" fill="url(#chip)" opacity="0.9"/>
    <text x="80" y="26" fill="#0f172a" font-size="16" font-weight="600" text-anchor="middle">Datos abiertos</text>
  </g>
  <g transform="translate(260, 510)">
    <rect width="160" height="40" rx="20" fill="#334155"/>
    <text x="80" y="26" fill="#e2e8f0" font-size="16" font-weight="600" text-anchor="middle">7 indicadores</text>
  </g>
  <g transform="translate(440, 510)">
    <rect width="140" height="40" rx="20" fill="#334155"/>
    <text x="70" y="26" fill="#e2e8f0" font-size="16" font-weight="600" text-anchor="middle">Sin servidor</text>
  </g>
</svg>
